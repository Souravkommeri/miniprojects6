<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sports Secretary - Sports Management | College of Engineering Adoor</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <h1>College of Engineering Adoor - Sports Management</h1>
    <div class="navbar-actions">
      <span>Sports Secretary Portal</span>
      <button class="btn-logout" id="logoutBtn">Logout</button>
    </div>
  </nav>
  <main class="main-content">
    <div class="tabs">
      <button class="tab active" data-tab="stock">Stock (View Only)</button>
      <button class="tab" data-tab="events">Events Management</button>
    </div>
    <section class="section tab-content active" id="tab-stock">
      <div class="section-header">
        <h2>Stock Information (with Damaged)</h2>
      </div>
      <div id="stockList" class="loading">Loading...</div>
    </section>
    <section class="section tab-content" id="tab-events">
      <div class="section-header">
        <h2>Upcoming Events</h2>
        <button class="btn btn-primary btn-sm" id="addEventBtn">Add Event</button>
      </div>
      <div id="eventsList" class="loading">Loading...</div>
    </section>
  </main>
  <div class="modal-overlay" id="eventModal">
    <div class="modal">
      <h3 id="eventModalTitle">Add Event</h3>
      <form id="eventForm">
        <input type="hidden" id="eventId" value="">
        <div class="form-group">
          <label for="eventTitle">Title</label>
          <input type="text" id="eventTitle" required>
        </div>
        <div class="form-group">
          <label for="eventDesc">Description</label>
          <textarea id="eventDesc" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="eventDate">Event Date</label>
          <input type="date" id="eventDate" required>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="cancelEventBtn">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>
  <script src="/js/app.js"></script>
  <script src="/js/sportsSecretary.js"></script>
</body>
</html>
