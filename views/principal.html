<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Principal - Sports Management | College of Engineering Adoor</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <h1>College of Engineering Adoor - Sports Management</h1>
    <div class="navbar-actions">
      <span>Principal Portal</span>
      <button class="btn-logout" id="logoutBtn">Logout</button>
    </div>
  </nav>
  <main class="main-content">
    <div class="tabs">
      <button class="tab active" data-tab="stock">Stock</button>
      <button class="tab" data-tab="events">Events</button>
      <button class="tab" data-tab="reports">Reports & Verification</button>
    </div>
    <section class="section tab-content active" id="tab-stock">
      <div class="section-header">
        <h2>Stock Information</h2>
      </div>
      <div id="stockList" class="loading">Loading...</div>
    </section>
    <section class="section tab-content" id="tab-events">
      <div class="section-header">
        <h2>Events</h2>
      </div>
      <div id="eventsList" class="loading">Loading...</div>
    </section>
    <section class="section tab-content" id="tab-reports">
      <div class="section-header">
        <h2>Reports (with Office Comments - Verify/Approve)</h2>
      </div>
      <div id="reportsList" class="loading">Loading...</div>
    </section>
  </main>
  <div class="modal-overlay" id="reportDetailModal">
    <div class="modal" style="max-width: 700px;">
      <h3 id="reportDetailTitle">Report Details</h3>
      <div id="reportDetailContent"></div>
      <div id="reportDetailComments" style="margin-top: 1rem;"></div>
      <div class="modal-actions" id="reportDetailActions"></div>
    </div>
  </div>
  <script src="/js/app.js"></script>
  <script src="/js/principal.js"></script>
</body>
</html>
